services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-relaynews}
      POSTGRES_USER: ${POSTGRES_USER:-relaynews}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      args:
        RELAYNEWS_BUILD_REF: ${RELAYNEWS_BUILD_REF:-dev}
    env_file:
      - ${API_ENV_FILE}
    labels:
      ai.relaynews.build_ref: ${RELAYNEWS_BUILD_REF:-dev}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${API_HOST_PORT}:8787"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/health').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  cloudflared:
    image: cloudflare/cloudflared:latest
    depends_on:
      api:
        condition: service_healthy
    command:
      [
        "tunnel",
        "--no-autoupdate",
        "run",
        "--token",
        "${CLOUDFLARE_TUNNEL_TOKEN:?set CLOUDFLARE_TUNNEL_TOKEN in api env}",
      ]
    restart: unless-stopped

volumes:
  postgres-data:
