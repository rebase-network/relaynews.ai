services:
  origin:
    build:
      context: ..
      dockerfile: apps/origin/Dockerfile
    env_file:
      - ${ORIGIN_ENV_FILE}
    ports:
      - "127.0.0.1:${ORIGIN_HOST_PORT}:8787"
    networks:
      default:
      tunnel:
        aliases:
          - relaynews-origin
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/health').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  tunnel:
    external: true
    name: rebase-production_default
